name: Sijishe Auto Check-in

on:
  workflow_dispatch:
  schedule:
    - cron: '0 23 * * *'

jobs:
  checkin:
    runs-on: windows-latest

    steps:
      - name: 获取代码 (Checkout)
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装所有 Python 依赖 (一次性解决)
        run: |
          python -m pip install --upgrade pip
          # 补全所有依赖，并锁定 selenium 版本防止旧代码崩溃
          pip install requests ddddocr selenium==4.9.1

      - name: 解压自带的 Chrome 浏览器
        run: |
          7z x chrome-win64.7z -o"chrome-win64"

      - name: 运行签到脚本
        env:
          # 统一使用 XSIJISHE 这个变量名传递账号密码
          XSIJISHE: ${{ secrets.XSIJISHE }}
          PYTHONIOENCODING: utf-8  # <--- 加上这一行，强制允许打印中文
        run: |
          python sijishe.py
