name: Sijishe Auto Check-in

on:
  workflow_dispatch: # 允许你在 Actions 页面手动点击运行，方便测试
  schedule:
    # 定时运行：每天 UTC 时间 23:00 运行（换算成北京时间是早上 7:00）
    # 注意：Github Actions 的定时任务资源是排队的，实际运行时间可能会晚十几分钟
    - cron: '0 23 * * *'

jobs:
  checkin:
    runs-on: windows-latest # 关键点：必须用 Windows 环境解压和运行自带的 Chrome

    steps:
      - name: 获取代码 (Checkout)
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 安装 Python 依赖
        run: |
          python -m pip install --upgrade pip
          pip install selenium requests lxml

      - name: 解压自带的 Chrome 浏览器
        run: |
          7z x chrome-win64.7z -o"chrome-win64"

      - name: 运行签到脚本
        env:
          # 这里会读取你在第二步设置的 Secrets，并作为环境变量传给 Python 脚本
          USER_NAME: ${{ secrets.USER_NAME }}
          PASSWORD: ${{ secrets.PASSWORD }}
        run: |
          python sijishe.py
